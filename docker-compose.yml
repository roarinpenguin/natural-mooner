version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: natural-mooner-backend
    volumes:
      - ./backend:/app
      - feedback-data:/app/data
    ports:
      - "8001:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: always

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: natural-mooner-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  feedback-data:
